directories:
  output: dist
  buildResources: build
appId: com.local.labelprintertool
productName: 打印标签工具
files:
  - filter:
      - electron.js
      - preload.js
      - index.html
      - src/**/*
      - package.json
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 打印标签工具
electronVersion: 31.7.7
